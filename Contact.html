<head>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, dodgerblue, #1e90ff);

}

/* NAVBAR */
.navbar {
    background: rgba(0, 0, 0, 0.3);
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;

}

/* CONTACT SECTION */
.contact-section {
    padding: 40px;
    text-align: center;
}

/* FORM */
form {
    margin-top: 20px;
}

form input,
form textarea {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 300px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

form textarea {
    height: 120px;
    resize: none;
}

button {
    padding: 12px 25px;
    background: white;
    color: dodgerblue;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #f0f0f0;
}

/* SOCIAL LINKS */
.social {
    margin-top: 20px;
}

.social a {
    color: white;
    margin: 0 10px;
